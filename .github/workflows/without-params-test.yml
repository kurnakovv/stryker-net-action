name: Test without params

on: [push, pull_request]

jobs:
  stryker_net:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    name: Stryker.NET GitHub action
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      
      - name: Stryker.NET
        uses: ./
