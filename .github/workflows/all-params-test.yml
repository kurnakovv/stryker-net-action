on: [push]

jobs:
  stryker_net:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tests/SimpleProjectForStryker/
    permissions:
      pull-requests: write
    name: Stryker.NET GitHub action
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Extract all branches, this is needed to compare branches (when report-source-branch-diff:true)
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      
      - name: Stryker.NET
        uses: ./
        with:
          config-path: ".config/stryker-config.json"
          dashboard-api-key: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
          report-source-branch: "true"
          report-source-branch-diff: "false"
          upload-report: "true"
